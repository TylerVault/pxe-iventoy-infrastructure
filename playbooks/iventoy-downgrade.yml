- name: Downgrade iVentoy
  hosts: pxe_servers
  become: true
  gather_facts: true

  vars:
    iventoy_version: "1.0.35"
    iventoy_tar: "files/iventoy/iventoy-{{ iventoy_version }}-linux-x86_64-free.tar.gz"
    iventoy_path: "/opt/iventoy"
    backup_path: "/opt/iventoy_backup_{{ ansible_date_time.date }}.tar.gz"

  tasks:

    # -----------------------------
    # STOP SERVICE (NO RESTART LOOP)
    # -----------------------------
    - name: Stop iVentoy service
      systemd:
        name: iventoy
        state: stopped
        enabled: true
      ignore_errors: true

    - name: Kill any remaining iVentoy processes
      shell: |
        systemctl kill -s SIGKILL iventoy || true
        pkill -9 -f /opt/iventoy || true
        killall -9 iventoy || true
      changed_when: false
      failed_when: false

    # -----------------------------
    # BACKUP (FIXED EXCLUDES)
    # -----------------------------
    - name: Create backup (safe explict include list)
      become: true
      shell: |
        sudo tar -czvf {{ backup_path }} \
            -C {{ iventoy_path }} \
            config user log data
        
      args:
        executable: /bin/bash

    # -----------------------------
    # EXTRACT DOWNGRADE PACKAGE
    # -----------------------------
    - name: Extract downgrade package
      unarchive:
        src: "{{ iventoy_tar }}"
        dest: /tmp
        remote_src: false

    # -----------------------------
    # DEPLOY NEW VERSION
    # -----------------------------
    - name: Deploy downgrade version
      copy:
        src: "/tmp/iventoy-{{ iventoy_version }}/"
        dest: "{{ iventoy_path }}/"
        remote_src: true

    # -----------------------------
    # START SERVICE
    # -----------------------------
    - name: Start iVentoy service
      systemd:
        name: iventoy
        state: started
        enabled: true

    # -----------------------------
    # FINAL CHECK
    # -----------------------------
    - name: Show service status
      command: systemctl status iventoy --no-pager
      register: status
      changed_when: false

    - debug:
        var: status.stdout_lines